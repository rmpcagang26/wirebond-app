name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Build EXE
      run: |
        pyinstaller launcher.py --onefile --noconsole --clean --collect-all webview

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: launcher-exe
        path: dist/*.exe
